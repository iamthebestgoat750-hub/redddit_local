[phases.setup]
nixPkgs = ["chromium", "nss", "atk", "cups", "dbus", "expat", "fontconfig", "gdk-pixbuf", "glib", "gtk3", "libX11", "libXcomposite", "libXcursor", "libXdamage", "libXext", "libXfixes", "libXi", "libXrandr", "libXrender", "libXScrnSaver", "libXtst", "Mesa", "nspr", "pango", "xorg.libxcb"]

[phases.build]
cmds = ["npm install", "npx playwright install chromium", "npx prisma migrate deploy", "npm run build"]

[start]
cmd = "npm start"
